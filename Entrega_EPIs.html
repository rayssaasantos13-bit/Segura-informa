<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrega de EPIs</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
}

/* Cabeçalho */
header{
    background:#003366;
    color:white;
    padding:15px 30px;
    display:flex;
    align-items:center;
    gap:15px;
}

header img{
    width:70px;
}

.container{
    max-width:1000px;
    margin:30px auto;
    padding:20px;
}

.card{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
    margin-bottom:25px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:8px;
    font-weight:bold;
}

input,
select,
textarea{
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

textarea{
    resize:none;
}

.full{
    grid-column:1 / -1;
}

button{
    background:#f4b400;
    color:black;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#e0a800;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:30px;
}

table th{
    background:#003366;
    color:white;
    padding:12px;
}

table td{
    padding:10px;
    border:1px solid #ddd;
    text-align:center;
}

@media(max-width:768px){

.form-grid{
    grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<header>
    <img src="img/logo.png" alt="Logo">
    <h2>Sistema de Controle de EPIs</h2>
</header>

<div class="container">

    <div class="card">

        <h1>Entrega de EPIs</h1>

        <form>

            <div class="form-grid">

                <div class="form-group">
                    <label>Nome do Colaborador</label>
                    <input type="text" placeholder="Digite o nome">
                </div>

                <div class="form-group">
                    <label>Matrícula</label>
                    <input type="text" placeholder="Número da matrícula">
                </div>

                <div class="form-group">
                    <label>Setor</label>
                    <select>
                        <option>Selecione</option>
                        <option>Produção</option>
                        <option>Almoxarifado</option>
                        <option>Logística</option>
                        <option>TI</option>
                        <option>RH</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Data da Entrega</label>
                    <input type="date">
                </div>

                <div class="form-group">
                    <label>EPI Entregue</label>
                    <select>
                        <option>Selecione</option>
                        <option>Capacete</option>
                        <option>Luva de Segurança</option>
                        <option>Óculos de Proteção</option>
                        <option>Protetor Auricular</option>
                        <option>Botina</option>
                        <option>Máscara Respiratória</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Quantidade</label>
                    <input type="number" min="1" value="1">
                </div>

                <div class="form-group full">
                    <label>Observações</label>
                    <textarea rows="4"></textarea>
                </div>

                <div class="form-group full">
                    <button type="submit">
                        Registrar Entrega
                    </button>
                </div>

            </div>

        </form>

    </div>

    <div class="card" style="margin-top:25px;">

        <h2>Histórico de Entregas</h2>

        <table>
            <thead>
                <tr>
                    <th>Colaborador</th>
                    <th>Setor</th>
                    <th>EPI</th>
                    <th>Qtd.</th>
                    <th>Data</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>João Silva</td>
                    <td>Produção</td>
                    <td>Capacete</td>
                    <td>1</td>
                    <td>02/06/2026</td>
                </tr>

                <tr>
                    <td>Maria Santos</td>
                    <td>Logística</td>
                    <td>Botina</td>
                    <td>1</td>
                    <td>02/06/2026</td>
                </tr>
            </tbody>
        </table>

    </div>

</div>

</body>
</html>
