<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Segura Informa</title>

<link rel="stylesheet" href="estiloLogin.css">

</head>
<body>

<div class="container">

<div class="card-login">

 <img src="img/logo.png" width="200px" alt="MonitorÁgua">
 <br>
     

<h1>Bem-vindo ao Segura Informa</h1>

<p class="subtitulo">
Acesse sua conta para consultar alertas,
mapa de risco, controle de EPIs e treinamentos
de segurança.
</p>

<input
type="email"
id="email"
placeholder="Digite seu e-mail">

<input
type="password"
id="senha"
placeholder="Digite sua senha">
<div class="esqueci-senha">
<a href="esqueci minha senha.html" class="forgot">Esqueceu a senha?</a>
</div>
<br>
<button
class="btn-entrar"
onclick="fazerLogin()">
Entrar
</button>

<button
class="btn-cadastro"
onclick="criarConta()">
Criar Conta
</button>

<p class="rodape">
Sistema de Gestão de Segurança do Trabalho
</p>

</div>

</div>

<script src="login.js"></script>

</body>
</html>
