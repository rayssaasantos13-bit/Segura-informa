<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>

    <link rel="stylesheet" type="text/css" href="estilo.css">
</head>

<body>
    <div class="container">
        <br><br>
        <img src="img/logo.png" width="200px" alt="MonitorÁgua">

        <br><br>

        <h1>Cadastro de Usuário</h1>
        <br><br>
        <form action="">
            <input type="text" placeholder="Nome completo" id="nome">
            <input type="text" placeholder="Digite seu número de matrícula" id="matricula">
            <input type="email" placeholder="Digite seu Email" id="email">
            <input type="password" placeholder="Crie uma nova senha" id="senha">
            <input type="password" placeholder="Confirme sua nova senha" id="confirmarSenha">
            <br><br>

            <br><br>
            <button type="button" onclick="cadastrarUsuario()"
                style="background-color: #D9661c; color:#ffffff;">Cadastrar</button>
            <p><a href="telasistema.html"></a></p>
        </form>
    </div>
    <script src="JavaScript.js" type="text/javascript"></script>
</body>

</html>
