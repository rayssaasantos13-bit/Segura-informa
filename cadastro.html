<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Usuário</title>
  <link rel="stylesheet" type="text/css" href="estiloCadastro.css">
  <style>
    </style>
</head>
<body>
  <img src="img/logo.png" width="200px" alt="MonitorÁgua">
  <h1>Criar sua conta</h1>
  <p>Preencha seus dados para começar. É rápido e seguro.</p>

  <form>
    <div class="field">
      <label for="nome">Nome</label>
      <input id="nome" name="nome" type="text" placeholder="Seu nome" required />
    </div>

    <div class="field">
      <label for="sobrenome">Sobrenome</label>
      <input id="sobrenome" name="sobrenome" type="text" placeholder="Seu sobrenome" required />
    </div>

    <div class="field">
      <label for="email">E-mail</label>
      <input id="email" name="email" type="email" placeholder="E-mail" required />
    </div>

    <div class="field">
      <label for="telefone">Telefone</label>
      <input id="telefone" name="telefone" type="tel" placeholder="(11) 99999-9999" />
    </div>

    <div class="field">
      <label for="perfil">Perfil</label>
      <select id="perfil" name="perfil" required>
        <option value="" disabled selected>Selecione</option>
        <option>Funcionário</option>
        <option>Gestão</option>
      </select>
    </div>

    <div class="field">
      <label for="senha">Senha</label>
      <input id="senha" name="senha" type="password" placeholder="Senha" minlength="8" required />
    </div>

    <div class="field">
      <label for="confirmar">Confirmar senha</label>
      <input id="confirmar" name="confirmar" type="password" placeholder="Repita sua senha" minlength="8" required />
    </div>

    <label>
      <input type="checkbox" required />
      Eu concordo com os <strong>Termos de Uso</strong> e a <strong>Política de Privacidade</strong>.
    </label>

        <button href="#" class="google-btn">
            <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google">
            Continuar com o Google
        </button>

        <br>
    <button type="submit" class="btn btn-primary">Entrar</button>
    </div>

  </form>
</body>
</html>
