<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contorole de EPIs</title>

    <link rel="stylesheet" type="text/css" href="estilo.css">

</head>

<body>
</body>

<div class="container">
    <img src="img/logo.png" width="90px" style="float: left;">
    <img src="img/imagem4.png" width="30px" style="float:right;">
    <br><br>
    <br><br>
    <h1>Contorole de EPIs por área</h1>
    <label>
        <h2>Selecione a área de trabalho:</h2>
    </label>
    <select id="selecionarArea" onchange="mostrarEPIs()">
        <option>--Escolha uma área</option>
        <option value="almoxarifado">Almoxarifado</option>
        <option value="lazer">Área de lazer</option>
        <option value="deposito">Depósito de equipamentos pesados</option>
        <option value="gerador">Gerador</option>
        <option value="logistica">Logística</option>
        <option value="marketing">Marketing Digital</option>
        <option value="prducao1">Produção 1</option>
        <option value="producao2">Produção 2</option>
        <option value="rh">Recursos Humanos/RH</option>
        <option value="ti">TI</option>
        <option value="lab">Produção química</option>
    </select>

    <div id="infoepis"></div>

    <div class="checklist" id="checklist"></div>
    <button onclick="validarEPIs()">Validar EPIs</button>
    <div class="resultado"></div>
    
    <script src="JavaScript.js"></script>

</html>
