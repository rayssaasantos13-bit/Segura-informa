<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>

    <link rel="stylesheet" href="../css/perfil.css">
</head>

<body>

    <div class="container">

    <!-- MENU LATERAL -->

    <div class="menu-lateral" id="menuLateral">

        <img src="../img/logo.png" class="logo">

        <a href="mapaderiscoGest.html">Mapa de Risco</a>
        <a href="cadastroAreas.html">Cadastro de Áreas</a>
        <a href="cadastroEPIs.html">Cadastro de EPIs</a>
        <a href="tela de perfil.html">Perfil</a>

    <!-- CARD -->

    <div class="card">

        <button class="btn-menu" onclick="toggleMenu()">
            ☰
        </button>

        <h1>Perfil</h1>

        <p class="subtitulo">
            Visualize suas informações pessoais.
        </p>

        <div class="card-perfil">

         

            <h2 id="nome">Carregando...</h2>

            <span class="cargo" id="cargo">
                ...
            </span>

            <div class="linha"></div>

            <div class="dados">

               

                <div class="campo">
                    <label>Nome</label>
                    <input
                        type="text"
                        id="nomeInput"
                        readonly>
                </div>

                <div class="campo">
                    <label>Email</label>
                    <input
                        type="text"
                        id="email"
                        readonly>
                </div>

                <div class="campo">
                    <label>Cargo</label>
                    <input
                        type="text"
                        id="cargoInput"
                        readonly>
                </div>

            </div>

            <div class="botoes">

              

                <button class="btn-sair" id="logout">
                    Sair
                </button>

            </div>

        </div>

    </div>

    <script src="../js/perfil.js"></script>
