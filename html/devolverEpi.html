<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <title>Devolver EPI</title>

</head>


<body>
    <div class="container">

        <!-- MENU -->

        <aside class="menu-lateral" id="menuLateral">

            <div class="logo-area">

                <img src="../img/logo.png" class="logo" alt="Segura Informa">

            </div>
            <nav>
                <a href="mapa.html">Mapa de Risco</a>
                <a href="episConf.html">Confirmação de EPIs</a>
                <a href="devolverEpi.html">Devolver EPIs</a>
                <a href="perfilFunc.html">Perfil</a>
