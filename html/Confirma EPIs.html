<head>
  <meta charset="UTF-8">

<body>

  <div class="container">


    <div class="menu-lateral" id="menu">

      <img src="../img/logo.png" width="150px" alt="MonitorÁgua">

      <a href="../html/mapaderisco.html">Mapa de Risco</a>
      <a href="Confirma EPIs.html">Confirmação de EPIs</a>

      <a href="../html/tela de perfil.html">Tela de Perfil</a>

    </div>
    <div class="container">

      <div class="card">

        <button class="btn-menu" onclick="abrirMenu()">
          ☰
        </button>

        <h2>Confirmação de entrega de EPI</h2>

        <div class="form-grid">

          <div>
            <label>Funcionário</label>
            <input type="text" placeholder="Nome do colaborador">
          </div>


          <div>
            <label>EPI</label>
            <select>
              <option>Selecione</option>
              <option>Capacete</option>
              <option>Luva</option>
              <option>Óculos</option>
              <option>Botina</option>
              <option>Máscara</option>
              <option>Protetor Auditivo</option>
              <option>Colete refletido</option>
              <option>Respirador com filtro</option>
            </select>
          </div>

     
          <div>
            <label>Data da Entrega</label>
            <input type="date">
          </div>
          
           <div>
            <label>Data de Devolução</label>
            <input type="date">
          </div>

        </div>
        <label>Nº do Termo</label>
        <input type="number" id="numeroTermo" placeholder="Ex: 0001">

        <button>Confirmar entrega</button>
      </div>

      <!-- Tabela -->

      <script src="../js/javaComfirma EPIS.js"></script>
