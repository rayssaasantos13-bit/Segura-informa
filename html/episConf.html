<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confirmação de EPIs</title>

<link rel="stylesheet" href="../css/episConf.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- MENU -->

    <aside class="menu-lateral" id="menuLateral">

        <div class="logo-area">

            <img src="../imagens/logo.png"
                 class="logo">

        </div>

        <nav>

            <a href="mapaderisco.html">

                <i class="fa-solid fa-map-location-dot"></i>

                Mapa de Risco

            </a>

            <a href="ConfirmaEPIs.html" class="ativo">

                <i class="fa-solid fa-box-open"></i>

                Confirmação de EPIs

            </a>

            <a href="teladeperfil.html">

                <i class="fa-solid fa-user"></i>

                Perfil

            </a>

            <a href="login.html">

                <i class="fa-solid fa-right-from-bracket"></i>

                Sair

            </a>

        </nav>

    </aside>

    <!-- CONTEÚDO -->

    <main class="conteudo">

        <header class="topo">

            <button
            class="btn-menu"
            onclick="toggleMenu()">

                <i class="fa-solid fa-bars"></i>

            </button>

            <div>

                <h1>Confirmação de EPIs</h1>

                <p>

                    Confirme as entregas realizadas aos colaboradores.

                </p>

            </div>

        </header>

        <section class="card">

            <h2>Confirmar Entrega</h2>

            <form>

                <div class="formulario">

                    <div class="campo">

                        <label>Data da Entrega</label>

                        <input type="date">

                    </div>

                    <div class="campo">

                        <label>Data da Devolução</label>

                        <input type="date">

                    </div>

                </div>

                <div class="botoes">

                    <button>

                        <i class="fa-solid fa-check"></i>

                        Confirmar Entrega

                    </button>

                </div>

            </form>

        </section>

    </main>

</div>

<script src="../js/javaConfirmaEPIS.js"></script>

</body>

</html>
