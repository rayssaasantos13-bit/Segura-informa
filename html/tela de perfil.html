    <div class="container">

        <h1>Perfil</h1>

        <p class="subtitulo">
            Visualize suas informações pessoais.
        </p>

        <div class="card-perfil">

         

            <h2 id="nome">Carregando...</h2>

            <span class="cargo" id="cargo">
                ...
            </span>

            <div class="linha"></div>

            <div class="dados">

               

                <div class="campo">
                    <label>Nome</label>
                    <input
                        type="text"
                        id="nomeInput"
                        readonly>
                </div>

                <div class="campo">
                    <label>Email</label>
                    <input
                        type="text"
                        id="email"
                        readonly>
                </div>

                <div class="campo">
                    <label>Cargo</label>
                    <input
                        type="text"
                        id="cargoInput"
                        readonly>
                </div>

            </div>

            <div class="botoes">

                <button class="btn-editar">
                    Editar Perfil
                </button>

                <button class="btn-sair" id="logout">
                    Sair
                </button>

            </div>

        </div>

    </div>
