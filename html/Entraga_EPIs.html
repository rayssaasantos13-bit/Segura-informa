<h1>Entrega de EPIs</h1>
<form>
<div class="form-grid">
<div class="form-group">
    <label>Nome do Colaborador</label>
    <input type="text" placeholder="Digite o nome">
</div>
    <div class="form-group">
    <label>Matrícula</label>
    <input type="text" placeholder="Número da matrícula">
</div>
<div class="form-group">
  <label>Setor</label>
<select>
    <option>Selecione</option>
    <option>Produção</option>
    <option>Almoxarifado</option>
    <option>Logística</option>
    <option>TI</option>
    <option>RH</option>
</select>
</div>
<div class="form-group">
  <label>Data da Entrega</label>
  <input type="date">
</div>
<div class="form-group">
  <label>EPI Entregue</label>
  <select>
      <option>Selecione</option>
      <option>Capacete</option>
      <option>Luva de Segurança</option>
      <option>Óculos de Proteção</option>
      <option>Protetor Auricular</option>
      <option>Botina</option>
      <option>Máscara Respiratória</option>
  </select>
</div>
<div class="form-group">
    <label>Quantidade</label>
    <input type="number" min="1" value="1">
</div>
<div class="form-group full">
    <label>Observações</label>
    <textarea rows="5"></textarea>
</div>
<br>
<div class="form-group full">
    <button type="submit">
      Registrar Entrega
    </button>
</div>
</div>
</form>
</div>
<div class="card" style="margin-top:25px;">
  <h2>Histórico de Entregas</h2>
  <table>
  <thead>
    <tr>
  <th>Colaborador</th>
  <th>Setor</th>
  <th>EPI</th>
  <th>Qtd.</th>
  <th>Data</th>
  </tr>
</thead>
<tbody>
  <tr>
  <td>João Silva</td>
  <td>Produção</td>
  <td>Capacete</td>
  <td>1</td>

  </tr>
<tr>

</tr>
</tbody>
</table>
