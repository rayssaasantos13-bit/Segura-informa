<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro de EPIs | Segura Informa</title>

    <link rel="stylesheet" href="../css/episCad.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <div class="container">

        <!-- MENU -->

        <aside class="menu-lateral" id="menuLateral">

            <div class="logo-area">

                <img src="../imagens/logo.png" class="logo" alt="Logo">

            </div>

            <nav>

                <a href="mapaGest.html">Mapa de Risco</a>
                <a href="areaCad.html">Cadastro de Áreas</a>
                <a href="episCad.html">Cadastro de EPIs</a>
                <a href="episEnt.html">Entregas de EPIs</a>
                <a href="devolucoes.html">Devoluções de EPIs</a>
                <a href="perfilAdm.html">Perfil</a>
                <a href="log.html">Sair</a>
            </nav>

        </aside>

        <!-- CONTEÚDO -->

        <main class="conteudo">

            <header class="topo">

                </button>
                <div>
                    <h1>Cadastro de EPIs</h1>

                    <p>Cadastre os Equipamentos de Proteção Individual disponíveis.</p>
                </div>
            </header>

            <section class="card">

                <h2>Novo Equipamento</h2>

                <div class="formulario">

                    <div class="campo">

                        <label>Nome do EPI</label>
                        <input type="text" id="nome" placeholder="Digite o nome do EPI">
                    </div>
                    <div class="campo">
                        <label>Descrição</label>
                        <input type="text" id="descricao" placeholder="Descrição do equipamento">
                    </div>
                    <div class="campo">
                        <label>Número do CA</label>
                        <input type="number" id="ca" placeholder="Número do Certificado">
                    </div>
                    <div class="campo">
                        <label>Quantidade em Estoque</label>
                        <input type="number" id="estoque" placeholder="Quantidade disponível">
                    </div>
                </div>

                <!-- BOTÕES -->

                <div class="botoes">

                    <button id="btnCadastrar" class="btnCadastrar" onclick="cadastrarEpi()">

                        <i class="fa-solid fa-plus"></i>

                        Cadastrar

                    </button>

                    <button id="btnAtualizar" class="btnAtualizar" onclick="atualizarEpi()" style="display:none">

                        <i class="fa-solid fa-pen"></i>

                        Atualizar

                    </button>
                    <button class="btnCancelar" onclick="LimparCampos()">

                        <i class="fa-solid fa-trash"></i>

                        Limpar

                    </button>
                
                </div>
              
            </section>

            <!-- TABELA -->

            <input type="hidden" id="idEpi">

            <section class="card">
                <h2>EPIs Cadastrados</h2>

                <div class="tabela">

                    <table id="tabelaEpis">

                        <thead>
                            <tr>

                                <th>Nome do EPI</th>
                                <th>Descrição</th>
                                <th>CA</th>
                                <th>Quantidade</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                </div>
                
                </table>

            </section>

        </main>

        <script src="../js/cadastroEPIS.js"></script>
</body>

</html>
