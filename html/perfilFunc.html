<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Perfil | Segura Informa</title>

<link rel="stylesheet" href="../css/perfilFunc.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- MENU -->

    <aside class="menu-lateral" id="menuLateral">

        <div class="logo-area">

            <img src="../imagens/logo.png"
            class="logo">

        </div>

        <nav>

            <a href="mapa.html">

                <i class="fa-solid fa-map-location-dot"></i>

                Mapa de Risco

            </a>

            <a href="episConf.html">

                <i class="fa-solid fa-box-open"></i>

                Confirmação de EPIs

            </a>

            <a href="perfilFunc.html"
            class="ativo">

                <i class="fa-solid fa-user"></i>

                Perfil

            </a>

            <a href="log.html">

                <i class="fa-solid fa-right-from-bracket"></i>

                Sair

            </a>

        </nav>

    </aside>

    <!-- CONTEÚDO -->

    <main class="conteudo">

        <header class="topo">

            <button
            class="btn-menu"
            onclick="toggleMenu()">

                <i class="fa-solid fa-bars"></i>

            </button>

            <div>

                <h1>Meu Perfil</h1>

                <p>

                    Visualize suas informações.

                </p>

            </div>

        </header>

        <!-- PERFIL -->

        <section class="perfil-card">

            <div class="perfil-topo">

                <div class="foto">

                    <i class="fa-solid fa-user"></i>

                </div>

                <div>

                    <h2 id="nome">

                        Carregando...

                    </h2>

                    <span
                    class="cargo"
                    id="cargo">

                        Funcionário

                    </span>

                </div>

            </div>

            <div class="dados">

                <div class="campo">

                    <label>Nome</label>

                    <input
                    id="nomeInput"
                    readonly>

                </div>

                <div class="campo">

                    <label>E-mail</label>

                    <input
                    id="email"
                    readonly>

                </div>

                <div class="campo">

                    <label>Cargo</label>

                    <input
                    id="cargoInput"
                    readonly>

                </div>

            </div>

            <div class="acoes">

                <button
                class="btn-sair"
                id="logout">

                    <i class="fa-solid fa-right-from-bracket"></i>

                    Sair

                </button>

            </div>

        </section>

    </main>

</div>

<script src="../js/perfil.js"></script>

</body>

</html>
