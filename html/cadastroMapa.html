<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro de Mapa</title>

    <link rel="stylesheet" href="../css/cadastroMapa.css">

</head>

<body>

<div class="container">

    <div class="menu-lateral" id="menu">

        <img src="../img/logo.png" width="150" alt="MonitorÁgua">

        <a href="mapaderiscoGest.html">Mapa de Risco</a>
        <a href="areasGest.html">Áreas</a>
        <a href="cadastroAreas.html">Cadastro Área</a>
        <a href="cadastroEPIs.html">Cadastro EPIs</a>
        <a href="tela de perfil.html">Tela de Perfil</a>
        <a href="login.html">Sair</a>

    </div>


    <div class="card">

        <button class="btn-menu" onclick="abrirMenu()">
            ☰
        </button>


        <h1>Cadastro de Mapa de Risco</h1>


     <form id="formMapa">

    <input type="hidden" id="idMapa">

    <div class="layoutMapa">

        <!-- COLUNA ESQUERDA -->
        <div class="colunaEsquerda">

            <div class="campo">
                <label for="areas">Área</label>

                <select id="areas">
                    <option value="">Selecione uma área</option>
                </select>
            </div>

            <div class="campo">
                <label>Descrição da Área</label>

                <textarea
                    id="descricaoArea"
                    rows="4"
                    readonly>
                </textarea>
            </div>

            <div class="campo">
                <label>Riscos da Área</label>

                <div id="listaRiscos">

                    <p>Selecione uma área.</p>

                </div>
            </div>

        </div>

        <!-- COLUNA DIREITA -->
        <div class="colunaDireita">

            <div class="campo">

                <label>Descrição do Mapa</label>

                <textarea
                    id="descricao"
                    rows="5"
                    placeholder="Digite uma descrição do mapa">
                </textarea>

            </div>

            <div class="campo">

                <label>Mapa de Risco</label>

                <label for="imagemMapa" class="btnUpload">

                    📁 Selecionar imagem

                </label>

                <input
                    type="file"
                    id="imagemMapa"
                    accept=".png,.jpg,.jpeg"
                    hidden>

                <p id="nomeArquivo">

                    Nenhuma imagem selecionada.

                </p>

            </div>

            <div class="campo">

                <label>Pré-visualização</label>

                <img
                    id="previewMapa"
                    src=""
                    alt="Mapa">

            </div>

            <div class="linha">

                <div class="campo">

                    <label>Data de Criação</label>

                    <input
                        type="date"
                        id="dataCriacao">

                </div>

                <div class="campo">

                    <label>Data de Atualização</label>

                    <input
                        type="date"
                        id="dataAtualizacao">

                </div>

            </div>

            <div class="botoes">

                <button type="button" class="salvar" onclick="cadastrarMapa()">

                    Cadastrar

                </button>

                <button type="button" class="editar" onclick="editarMapa()">

                    Atualizar

                </button>

                <button type="button" class="deletar" onclick="deletarMapa()">

                    Deletar

                </button>

            </div>

        </div>

    </div>

</form>

    </div>


</div>



<script src="../js/cadastrarMapa.js"></script>


</body>

</html>
