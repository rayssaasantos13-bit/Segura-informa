<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro de Mapas</title>

    <link rel="stylesheet" href="../css/cadastroMapa.css">

</head>


<body>
<div class="container">

    <!-- MENU LATERAL -->

    <div class="menu-lateral" id="menuLateral">

        <img src="../img/logo.png" class="logo">

      <a href="mapaderiscoGest.html">Mapa de Risco</a>
        <a href="cadastroAreas.html">Cadastro de Áreas</a>
        <a href="cadastroEPIs.html">Cadastro de EPIs</a>
        <a href="cadastroDeEntrega.html">Entregas de EPIs</a>
        <a href="teladeperfilADM.html">Perfil</a>
        <a href="login.html">Sair</a>

    </div>

    <!-- CARD -->

    <div class="card">

        <button class="btn-menu" onclick="toggleMenu()">
            ☰
        </button>



            <h1>
                Cadastro de Mapas
            </h1>



            <!-- =========================
LISTA DE MAPAS
========================= -->


            <div class="lista-container">


                <h2>
                    Mapas cadastrados
                </h2>

<br>
<br>
                <div id="listaMapas">

                    <p>
                        Carregando mapas...
                    </p>


                </div>


            </div>





            <hr>





            <!-- =========================
FORMULÁRIO
========================= -->

<br>

            <h2>
                Cadastro de Mapa
            </h2>



            <form id="formMapa">


                <input type="hidden" id="idMapa">



                <div class="layoutMapa">



                    <div class="colunaEsquerda">


                        <div class="campo">
<br>
                            <label>
                                Área
                            </label>


                            <select id="areas">

                                <option value="">
                                    Selecione uma área
                                </option>


                            </select>


                        </div>




                        <div class="campo">


                            <label>
                                Descrição da Área
                            </label>


                            <textarea id="descricaoArea" rows="4" readonly>
</textarea>


                        </div>





                        <div class="campo">


                            <label>
                                Riscos da Área
                            </label>


                            <div id="listaRiscos">

                                <p>
                                    Selecione uma área.
                                </p>


                            </div>


                        </div>


                    </div>






                    <div class="colunaDireita">



                        <div class="campo">


                            <label>
                                Descrição do Mapa
                            </label>


                            <textarea id="descricao" rows="5" placeholder="Digite uma descrição do mapa">
</textarea>


                        </div>





                        <div class="campo">


                            <label>
                                Imagem do Mapa
                            </label>


                            <label for="imagemMapa" class="btnUpload">

                                📁 Selecionar imagem

                            </label>



                            <input type="file" id="imagemMapa" accept=".png,.jpg,.jpeg" hidden>


                            <p id="nomeArquivo">
                                Nenhuma imagem selecionada.
                            </p>



                        </div>






                        <div class="campo">


                            <label>
                                Pré-visualização
                            </label>


                            <img id="previewMapa" src="">


                        </div>







                        <div class="linha">


                            <div class="campo">

                                <label>
                                    Data Criação
                                </label>


                                <input type="date" id="dataCriacao">


                            </div>





                            <div class="campo">

                                <label>
                                    Data Atualização
                                </label>


                                <input type="date" id="dataAtualizacao">


                            </div>



                        </div>






                        <div class="botoes">


                            <button type="button" class="salvar" onclick="cadastrarMapa()">

                                Cadastrar

                            </button>



                            <button type="button" class="editar" onclick="editarMapa()">

                                Atualizar

                            </button>




                         



                        </div>




                    </div>



                </div>



            </form>



        </div>



    </div>





    <script src="../js/cadastrarMapa.js"></script>


</body>

</html>
