        <div class="card">

            <button class="btn-menu" onclick="abrirMenu()">
                ☰
            </button>

            <h1>Cadastro de Mapa de Risco</h1>

            <form id="formMapa">



                <!-- DESCRIÇÃO -->

                <div class="campo">

                    <label for="descricao">Descrição</label>

                    <textarea id="descricao" rows="5" placeholder="Digite uma descrição do mapa de risco..."></textarea>

                </div>

                <!-- IMAGEM -->

                <div class="campo">

                    <label>Mapa de Risco</label>

                    <label for="imagemMapa" class="btnUpload">

                        📁 Selecionar imagem

                    </label>

                    <input type="file" id="imagemMapa" accept=".png,.jpg,.jpeg" hidden>

                    <p id="nomeArquivo">

                        Nenhuma imagem selecionada.

                    </p>

                </div>

                <!-- PRÉ-VISUALIZAÇÃO -->

                <div class="campo">

                    <label>Pré-visualização</label>

                    <img id="previewMapa" src="../img/sem-imagem.png" alt="Pré-visualização do mapa">

                </div>

                <!-- DATAS -->

                <div class="linha">

                    <div class="campo">

                        <label for="dataCriacao">Data de Criação</label>

                        <input type="date" id="dataCriacao">

                    </div>

                    <div class="campo">

                        <label for="dataAtualizacao">Data de Atualização</label>

                        <input type="date" id="dataAtualizacao">

                    </div>

                </div>

                <!-- BOTÕES -->

                <div class="botoes">

                    <button type="button" class="salvar" onclick="cadastrarMapa()">

                        Cadastrar

                    </button>

                    <button type="button" class="editar" onclick="editarMapa(document.getElementById('idMapa').value)">
                        Atualizar
                    </button>

                    <button type="button" class="deletar"
                        onclick="deletarMapa(document.getElementById('idMapa').value)">
                        Deletar
                    </button>

                </div>

            </form>

        </div>

    </div>

    <script src="../js/cadastrarMapa.js"></script>

</body>
