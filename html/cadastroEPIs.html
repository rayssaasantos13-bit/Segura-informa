<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro de Mapa</title>

    <link rel="stylesheet" href="../css/estiloEntrega.css">

</head>

<body>

<div class="container">

    <div class="menu-lateral" id="menu">

        <img src="../img/logo.png" width="150" alt="MonitorÁgua">

        <a href="mapaderiscoGest.html">Mapa de Risco</a>
        <a href="areasGest.html">Áreas</a>
        <a href="Confirma EPIs.html">Confirma EPIs</a>
        <a href="Entrega_EPIs.html">Entrega de EPIs</a>
        <a href="tela de perfil.html">Tela de Perfil</a>
        <a href="login.html">Sair</a>

    </div>


    <div class="card">

        <button class="btn-menu" onclick="abrirMenu()">
            ☰
        </button>
  

    <header>

      <div class="logo-area">
        <i class="fa-solid fa-helmet-safety"></i>
        <span>Entrega de EPIs</span>
      </div>

      <div class="user-area">
        <i class="fa-solid fa-user"></i>
        <span>Administrador</span>
      </div>

    </header>

    <h2>Cadastro de Entrega de EPIs</h2>

    <form id="Entrega">
<div class="form-group">

    <label>Nome do Funcionário</label>

    <input type="text"
           id="nomeFuncionario"
           placeholder="Digite o nome do funcionário"
           required>

</div>

      <div class="form-group">

        <label>EPI</label>

        <select id="idEpi" required>

          <option value="">Selecione o EPI...</option>

        </select>

      </div>

      <div class="form-group">

        <label>Data da Entrega</label>

        <input type="date" id="dataEntrega" required>

      </div>

      <div class="form-group">

        <label>Data da Devolução</label>

        <input type="date" id="dataDevolucao">

      </div>

      <div class="form-group">

        <label>Entrega Aceita?</label>

        <select id="aceito">

          <option value="true">Sim</option>

          <option value="false">Não</option>

        </select>

      </div>

      <div class="actions-bar">

        <button type="submit" class="btn btn-success">

          <i class="fa-solid fa-plus"></i>

          Cadastrar

        </button>

        <button type="button" id="btnAtualizar" class="btn btn-primary">

          Atualizar

        </button>

        <button type="button" id="btnExcluir" class="btn btn-danger">

          Excluir

        </button>

        <button type="reset" class="btn btn-secondary">

          Limpar

        </button>

      </div>

    </form>

  </div>

  <div class="card">

    <h2>Entregas Cadastradas</h2>

    <table id="tabelaEntrega">

      <thead>

        <tr>

          <th>ID</th>
          <th>Funcionário</th>
          <th>EPI</th>
          <th>Entrega</th>
          <th>Devolução</th>
          <th>Aceito</th>
          <th>Ações</th>

        </tr>

      </thead>

      <tbody>

      </tbody>

    </table>

  </div>

</div>

<div id="respostaEntrega"></div>

<script src="../js/JavaEntrega.js"></script>
