<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro de EPI</title>

    <link rel="stylesheet" href="../css/cadastroEPIS.css">

</head>


<body>


<div class="container">


    <!-- MENU LATERAL -->

    <div class="menu-lateral" id="menuLateral">

        <img src="../img/logo.png" class="logo">

 <a href="mapaderiscoGest.html">Mapa de Risco</a>
        <a href="cadastroAreas.html">Cadastro de Áreas</a>
        <a href="cadastroEPIs.html">Cadastro de EPIs</a>
        <a href="cadastroDeEntrega.html">Entregas de EPIs</a>
        <a href="teladeperfilADM.html">Perfil</a>
        <a href="login.html">Sair</a>

    </div>



    <!-- ÁREA PRINCIPAL -->


    <div class="conteudo">


        <!-- BOTÃO MENU -->

        <button class="btn-menu" onclick="toggleMenu()">

            ☰

        </button>



        <!-- CARD PRINCIPAL -->


        <div class="card">


            <h1>
                Cadastro de EPI
            </h1>


            <p class="subtitulo">

                Cadastre os Equipamentos de Proteção Individual disponíveis.

            </p>




            <div class="formulario">



                <div class="campo">

    <label for="nome">
        Nome do EPI
    </label>

    <input 
        type="text"
        id="nome"
        placeholder="Digite o nome do EPI">

</div>


<div class="campo">

    <label for="descricao">
        Descrição
    </label>

    <input 
        type="text"
        id="descricao"
        placeholder="Digite a descrição do EPI">

</div>


<div class="campo">

    <label for="ca">
        Número do CA
    </label>

    <input 
        type="number"
        id="ca"
        placeholder="Digite o número do CA">

</div>


<div class="campo">

    <label for="estoque">
        Quantidade em Estoque
    </label>

    <input 
        type="number"
        id="estoque"
        placeholder="Informe a quantidade disponível">

</div>

                <div class="botoes">


                    <button onclick="CadastrarEpi()">

                        Cadastrar

                    </button>



                    <button 
                        class="limpar"
                        onclick="LimparCampos()">

                        Limpar

                    </button>


                </div>


            </div>


        </div>


    </div>


</div>




<script src="../js/cadastroEPIS.js"></script>


</body>

</html>
