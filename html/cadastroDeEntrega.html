<div class="container">


<div class="card">


<h2>
Entrega de EPI
</h2>



<form id="Entrega">



<div class="form-group">

<label>
Funcionário
</label>


<select id="funcionario" required>

<option value="">
Selecione o funcionário
</option>

</select>

</div>





<div class="form-group">

<label>
EPI
</label>


<select id="epi" required>

<option value="">
Selecione o EPI
</option>

</select>


</div>





<div class="form-group">

<label>
Número CA
</label>


<input 
type="text"
id="numeroCA"
readonly>


</div>





<div class="form-group">

<label>
Data da entrega
</label>


<input 
type="date"
id="dataEntrega"
required>


</div>





<div class="form-group">

<label>
Data de devolução
</label>


<input 
type="date"
id="dataDevolucao">


</div>





<button 
type="submit">

Entregar EPI

</button>



</form>


</div>


</div>



<script src="../js/JavaEntrega.js"></script>
