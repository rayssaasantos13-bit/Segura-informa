<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro de Áreas | Segura Informa</title>

    <link rel="stylesheet" href="../css/areaCad.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- MENU -->

    <aside class="menu-lateral" id="menu">

        <div class="logo-area">

            <img src="../imagens/logo.png"
                 class="logo"
                 alt="Logo">

        </div>

        <nav>

            <a href="mapaderiscoGest.html">
                <i class="fa-solid fa-map-location-dot"></i>
                Mapa de Risco
            </a>

            <a href="cadastroAreas.html" class="ativo">
                <i class="fa-solid fa-industry"></i>
                Cadastro de Áreas
            </a>

            <a href="cadastroEPIs.html">
                <i class="fa-solid fa-helmet-safety"></i>
                Cadastro de EPIs
            </a>

            <a href="cadastroDeEntrega.html">
                <i class="fa-solid fa-box"></i>
                Entregas
            </a>

            <a href="teladeperfilADM.html">
                <i class="fa-solid fa-user"></i>
                Perfil
            </a>

            <a href="login.html">
                <i class="fa-solid fa-right-from-bracket"></i>
                Sair
            </a>

        </nav>

    </aside>

    <!-- CONTEÚDO -->

    <main class="conteudo">

        <header class="topo">

            <button class="btn-menu"
                    onclick="abrirMenu()">

                <i class="fa-solid fa-bars"></i>

            </button>

            <div>

                <h1>Cadastro de Áreas</h1>

                <p>

                    Cadastre e gerencie todas as áreas de risco da empresa.

                </p>

            </div>

        </header>

        <!-- CARD -->

        <section class="card">

            <h2>Informações da Área</h2>

            <div class="formulario">

                <div class="campo">

                    <label>Área</label>

                    <select id="area">

                        <option value="">Selecione</option>

                        <option>Soldagem</option>
                        <option>Pintura</option>
                        <option>Produção</option>
                        <option>Manutenção</option>
                        <option>Almoxarifado</option>

                    </select>

                </div>

                <div class="campo">

                    <label>Tipo de Risco</label>

                    <select id="nomeArea">

                        <option value="">Selecione</option>

                        <option>Físico</option>
                        <option>Químico</option>
                        <option>Biológico</option>
                        <option>Ergonômico</option>
                        <option>Acidente</option>

                    </select>

                </div>

                <div class="campo">

                    <label>Grau</label>

                    <select id="grau">

                        <option value="">Selecione</option>

                        <option>Baixo</option>
                        <option>Médio</option>
                        <option>Alto</option>

                    </select>

                </div>

                <div class="campo campo-grande">

                    <label>Descrição</label>

                    <textarea id="descricaoArea"
                              rows="5"
                              placeholder="Descreva o risco encontrado"></textarea>

                </div>

            </div>

            <div class="botoes">

                <button
                    id="btnCadastrar"
                    class="btnCadastrar"
                    onclick="cadastrarArea()">

                    <i class="fa-solid fa-plus"></i>

                    Cadastrar

                </button>

                <button
                    id="btnAtualizar"
                    class="btnAtualizar"
                    onclick="atualizarArea()"
                    style="display:none">

                    <i class="fa-solid fa-pen"></i>

                    Atualizar

                </button>

                <button
                    class="btnCancelar"
                    onclick="limparCampos()">

                    <i class="fa-solid fa-trash"></i>

                    Limpar

                </button>

            </div>

        </section>

        <!-- TABELA -->

        <section class="card">

            <h2>Áreas Cadastradas</h2>

            <div class="tabela">

                <table id="tabelaAreas">

                    <thead>

                        <tr>

                            <th>ID</th>

                            <th>Área</th>

                            <th>Tipo</th>

                            <th>Grau</th>

                            <th>Descrição</th>

                            <th>Ações</th>

                        </tr>

                    </thead>

                    <tbody>

                    </tbody>

                </table>

            </div>

        </section>

    </main>

</div>

<script src="../js/cadastrarAreas.js"></script>

</body>

</html>
