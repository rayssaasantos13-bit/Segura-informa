<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Risco</title>

    <link rel="stylesheet" href="../css/mapaderisco.css">
</head>

<body>

    <nav id="menuLateral" class="menu-lateral">

        <img src="../img/logo.png" class="logo" alt="Logo">

        <a href="mapaderisco.html">Mapa de Risco</a>
        <a href="areas.html">Áreas</a>
        <a href="ControleEPIs.html">Controle de EPIs</a>
        <a href="Entrega_EPIs.html">Entrega de EPIs</a>
        <a href="tela de perfil.html">Perfil</a>
        <a href="login.html">Sair</a>

    </nav>

    <div class="container">

        <div class="card">

            <button class="btn-menu" onclick="toggleMenu()">
                ☰
            </button>

            <h1>Mapa de Risco</h1>

            <p class="subtitulo">
                Selecione uma área para visualizar o mapa de risco.
            </p>

            <div class="pesquisa">

                <select id="areas">
                    <option value="">Selecione uma área</option>
                </select>

                <button id="btnPesquisar" class="btn-pesquisar">
                    Pesquisar
                </button>

            </div>

            <div class="resultado">

                <h2>Mapa da Área</h2>

                <p id="textoResultado">
                    Selecione uma área e clique em pesquisar.
                </p>

                <div id="conteudoMapa">

                    <div class="mapa-grid">

                        <div class="mapa-imagem">

                            <img
                                id="imagemMapa"
                                src=""
                                alt="Mapa de Risco"
                                style="display:none;">

                        </div>

                        <div
                            id="infoMapa"
                            class="mapa-info"
                            style="display:none;">

                            <h3 id="nomeArea"></h3>

                            <div class="caixa-info">

                                <h4>Descrição</h4>

                                <p id="descricaoMapa"></p>

                            </div>

                            <div class="duas-caixas">

                                <div class="caixa-info">

                                    <h4>Data de Criação</h4>

                                    <p id="dataCriacao"></p>

                                </div>

                                <div class="caixa-info">

                                    <h4>Última Atualização</h4>

                                    <p id="dataAtualizacao"></p>

                                </div>

                            </div>

                            <div class="caixa-info">

                                <h4>Riscos da Área</h4>

                                <div id="listaRiscos">

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

            <button class="imprimir" onclick="imprimir()">
                🖨 Imprimir
            </button>

        </div>

    </div>

    <script src="../js/mapa.js"></script>

</body>

</html>
