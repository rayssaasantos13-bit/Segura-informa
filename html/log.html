<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <title>Login - Segura Informa</title>


    <link rel="stylesheet" href="../css/log.css">


    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">


</head>


<body>



    <!-- ==========================
     BANNER SUPERIOR
=========================== -->

    <header class="banner">




        <div class="texto-banner">







            <p>
                Sistema de Gestão de Segurança do Trabalho
            </p>


        </div>


    </header>






    <!-- ==========================
     CONTEÚDO LOGIN
=========================== -->


    <main class="container">



        <section class="card-login">



            <img src="../imagens/logo.png" class="logo-login" alt="Logo">





            <h1>
                Bem-vindo
            </h1>





            <p class="subtitulo">


                Acesse sua conta para consultar
                mapas de risco, controle de EPIs,
                áreas e informações de segurança.


            </p>







            <form id="loginUsuario">





                <div class="input-box">


                    <i class="fa-solid fa-envelope"></i>


                    <input type="email" id="email" placeholder="Digite seu e-mail" required>


                </div>






                <div class="input-box">


                    <i class="fa-solid fa-lock"></i>


                    <input type="password" id="senha" placeholder="Digite sua senha" required>


                </div>






                <button type="submit" class="btn-login">


                    Entrar


                </button>





            </form>







            <div class="cadastro-link">


                Não possui uma conta?


                <a href="../html/cadastro.html">

                    Cadastre-se

                </a>


            </div>







        </section>




    </main>







    <!-- ==========================
     RODAPÉ
=========================== -->


    <footer class="rodape">


        Sistema de Gestão de Segurança do Trabalho


        <span>
            | Segura Informa
        </span>


    </footer>







    <script src="../js/login.js"></script>


</body>

</html>
