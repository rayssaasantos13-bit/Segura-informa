<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Segura Informa</title>

<link rel="stylesheet" href="../css/estiloLogin.css">
</head>
<body>
<div class="container">
<div class="card-login">
 <img src="../img/logo.png" width="300px" alt="MonitorÁgua">
 <br>
<h1>Bem-vindo</h1>
<p class="subtitulo"> Acesse sua conta para consultar alertas, mapa de risco, controle de EPIs e treinamentos de segurança.</p>
<form id="loginUsuario">
  <div class="submit">
  <input id="email" name="email" type="email" placeholder="E-mail" autocomplete="email" required />
  </div>
  <div class="submit">
    <input id="senha" name="senha" type="password" placeholder="Sua senha" autocomplete="name" required />
  </div>
<button type="submit">Entrar</button>
</form>
<p class="rodape"> Sistema de Gestão de Segurança do Trabalho</p>
</div>
</div>
<script src="../js/login.js"></script>
</body>
</html>
