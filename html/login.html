<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Segura Informa</title>

<link rel="stylesheet" href="../css/estiloLogin.css">


<body>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<div class="container">

<div class="card-login">
 <img src="../img/logo.png" width="300px" alt="MonitorÁgua">
 <br>
<h1>Bem-vindo</h1>

<p class="subtitulo">
Acesse sua conta para consultar alertas, mapa de risco,
controle de EPIs e treinamentos de segurança.
</p>

<div class="input-box">
<i class="fa-solid fa-envelope"></i>
<input type="email" id="email" placeholder="E-mail">
</div>

<div class="input-box">
<i class="fa-solid fa-lock"></i>
<input type="password" id="senha" placeholder="Sua senha">
</div>

<button onclick="login()" class="btn-login">
Entrar
</button>

<div class="cadastro-link">
Não possui uma conta?
<a href="../html/cadastro.html">Cadastre-se</a>
</div>

<p class="rodape">
Sistema de Gestão de Segurança do Trabalho
</p>

</div>

</div>

<script src="../js/login.js"></script>

</body>
</html>
