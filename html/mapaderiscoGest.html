<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mapa de Risco</title>

    <link rel="stylesheet" href="../css/mapa.css">

</head>

<body>

<div class="container">

    <!-- MENU LATERAL -->

    <div class="menu-lateral" id="menuLateral">

        <img src="../img/logo.png" class="logo">

        <a href="mapaderisco.html">Mapa de Risco</a>
        <a href="alertas.html">Alertas</a>
        <a href="ControleEPIs.html">Controle de EPIs</a>
        <a href="Entrega_EPIs.html">Entrega de EPIs</a>
        <a href="perfil.html">Perfil</a>
        <a href="login.html">Sair</a>

    </div>

    <!-- CARD -->

    <div class="card">

    

        <button class="btn-menu" onclick="toggleMenu()">
            ☰
        </button>

        <h1>Mapa de Risco</h1>

        <p class="subtitulo">
            Selecione uma área para visualizar o mapa de risco.
        </p>

        <div class="pesquisa">

            <select id="areas">
                <option value="">Selecione uma área</option>
            </select>

            <button onclick="PesquisarMapa()">
                Pesquisar
            </button>

        </div>

        <div class="acoes">

            <button class="novoMapa" onclick="CadastrarMapa()">
                <span>+</span>
                Cadastrar Novo Mapa
            </button>

           

        </div>

        <div class="resultado">

            <h2>Mapa da Área</h2>

            <p id="textoResultado">
                Nenhuma área selecionada.
            </p>

            <div id="conteudoMapa">

                <span>O mapa aparecerá aqui.</span>

            </div>

        </div> <br>
 <button class="imprimir" onclick="window.print()">
                🖨 Imprimir
            </button>
    </div>

</div>

<script src="../js/mapa.js"></script>

</body>

</html>
