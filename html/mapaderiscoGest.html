<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mapa de Risco</title>

    <link rel="stylesheet" href="../css/mapaderisco.css">

</head>

<body>

<div class="container">

    <!-- MENU LATERAL -->

    <div class="menu-lateral" id="menuLateral">

        <img src="../img/logo.png" class="logo">

        <a href="mapaderiscoGest.html">Mapa de Risco</a>
        <a href="cadastroAreas.html">Cadastro de Áreas</a>
        <a href="cadastroEPIs.html">Cadastro de EPIs</a>
        <a href="cadastroDeEntrega.html">Entregas de EPIs</a>
        <a href="teladeperfilADM.html">Perfil</a>
        <a href="login.html">Sair</a>

    </div>

    <!-- CARD -->

    <div class="card">

        <button class="btn-menu" onclick="toggleMenu()">
            ☰
        </button>

        <h1>Mapa de Risco</h1>

        <p class="subtitulo">
            Selecione uma área para visualizar o mapa de risco.
        </p>

        <div class="pesquisa">

            <select id="areas">
                <option value="">Selecione uma área</option>
            </select>
<button class="btn-pesquisar" onclick="PesquisarMapa()">
    Pesquisar
</button>

        </div>

        <div class="acoes">

            <button class="novoMapa" onclick="CadastrarMapa()">
                <span>+</span>
                Cadastrar Novo Mapa
            </button>

           

        </div>

        <div class="resultado">

            <h2>Mapa da Área</h2>

            <p id="textoResultado">
                Nenhuma área selecionada.
            </p>

           <div id="conteudoMapa">

    <div class="mapa-grid">

        <div class="mapa-imagem">

            <img id="imagemMapa"
                 src=""
                 alt="Mapa de Risco"
                 style="display:none;">

        </div>


        <div id="infoMapa" class="mapa-info">

            <h3 id="nomeArea"></h3>


            <div class="caixa-info">

                <h4>Descrição da Área</h4>

                <p id="descricaoAreaMapa"></p>

            </div>


            <div class="caixa-info">

                <h4>Descrição do Mapa</h4>

                <p id="descricaoMapa"></p>

            </div>


            <div class="duas-caixas">


                <div class="caixa-info">

                    <h4>Data de Criação</h4>

                    <p id="dataCriacao"></p>

                </div>


                <div class="caixa-info">

                    <h4>Última Atualização</h4>

                    <p id="dataAtualizacao"></p>

                </div>


            </div>


            <div class="caixa-info">

                <h4>Riscos da Área</h4>

                <div id="listaRiscos"></div>

            </div>


        </div>


    </div>

</div>
        </div> <br>
 <button class="imprimir" onclick="window.print()">
                🖨 Imprimir
            </button>
    </div>

</div>

<script src="../js/mapa.js"></script>

</body>

</html>
