<h1>Entrega de EPIs</h1>
<form>
<div class="submit">
      <label for="Nome">Nome do EPI:</label>
      <input id="nome" name="nome" type="text" placeholder="E-mail" required />
    </div>

    <div class="form-group">
    <label>Descrição</label>
    <input type="text" placeholder="Descrição">

    <div class="form-group">
  <label>Data da Entrega</label>
  <input type="date">
</div>
<div class="form-group">
  <label>Data da Devolução</label>
  <input type="date">
</div>
<div class="form-group">
   <label for="EPI">Nome do EPI:</label>
      <input id="EPI" name="EPI" type="text" placeholder="Digite o Nome do EPI" required />
    </div>
</div>
<div class="form-group">
    <label>Quantidade</label>
    <input type="number" min="1" value="1">
</div>
</div>
<div class="form-group">

  </div>

</div>



<div class="form-group full">
    <button type="submit">
      Registrar Entrega
    </button>
</div>
</div>
</form>
