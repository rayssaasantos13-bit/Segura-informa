<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro - Segura Informa</title>

<link rel="stylesheet" href="../css/estiloCadastro.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<div class="container">

<div class="card">

<h1>Criar Conta</h1>

<p class="subtitulo">
Cadastre-se para acessar alertas, mapas de risco,
controle de EPIs e treinamentos de segurança.
</p>

<div class="info-box">
⚠️ Seus dados serão utilizados apenas para acesso ao sistema Segura Informa.
</div>

<form id="formCadastro">

<div class="linha">

<div class="campo">
<label>Nome</label>
<div class="input-icon">
<i class="fa-solid fa-user"></i>
<input type="text" id="nome" placeholder="Seu nome">
</div>
</div>

<div class="campo">
<label>Sobrenome</label>
<div class="input-icon">
<i class="fa-solid fa-user"></i>
<input type="text" id="sobrenome" placeholder="Seu sobrenome">
</div>
</div>

</div>

<div class="linha">

<div class="campo">
<label>E-mail</label>
<div class="input-icon">
<i class="fa-solid fa-envelope"></i>
<input type="email" id="email" placeholder="Digite seu e-mail">
</div>
</div>

<div class="campo">
<label>Telefone</label>
<div class="input-icon">
<i class="fa-solid fa-phone"></i>
<input type="text" id="telefone" placeholder="(79) 99999-9999">
</div>
</div>

</div>

<div class="linha">

<div class="campo">
<label>Perfil</label>
<select id="perfil">
<option value="">Selecionar Perfil</option>
<option>Administrador</option>
<option>Funcionário</option>
</select>
</div>

<div class="campo">
<label>Senha</label>
<div class="input-icon">
<i class="fa-solid fa-lock"></i>
<input type="password" id="senha" placeholder="Digite sua senha">
</div>
</div>

</div>

<label>Confirmar Senha</label>

<div class="input-icon">
<i class="fa-solid fa-lock"></i>
<input type="password" id="confirmarSenha" placeholder="Confirme sua senha">
</div>

<button type="submit" class="btn-cadastrar">
Cadastrar
</button>

</form>

<a href="login.html" class="login-link">
Já possui conta? Entrar
</a>

</div>

</div>
    <button type="submit">Cadastrar</button>

<script src="../js/javaCadastro.js"></script>

</body>
</html>
