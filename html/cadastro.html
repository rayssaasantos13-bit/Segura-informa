<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro - Segura Informa</title>

<link rel="stylesheet" href="../css/estiloCadastro.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<div class="container">

<div class="card">

<h1>Criar Conta</h1>

<p class="subtitulo">
Cadastre-se para acessar alertas, mapas de risco,
controle de EPIs e treinamentos de segurança.
</p>

<div class="info-box">
⚠️ Seus dados serão utilizados apenas para acesso ao sistema Segura Informa.
</div>

<form id="cadastroUsuario">

<div class="linha">

<div class="campo">
<label>Nome</label>
<div class="input-icon">
<i class="fa-solid fa-user"></i>
<input type="text" id="nome" placeholder="Seu nome">
</div>


<div class="linha">

<div class="campo">
<label>E-mail</label>
<div class="input-icon">
<i class="fa-solid fa-envelope"></i>
<input type="email" id="email" placeholder="Digite seu e-mail">
</div>


<div class="linha">

<div class="campo">
<label>Cargo</label>
<select id="cargo">
<option value="">Selecionar Cargo</option>
<option>Gestão</option>
<option>Funcionário</option>
</select>
</div>

<div class="campo">
<label>Senha</label>
<div class="input-icon">
<i class="fa-solid fa-lock"></i>
<input type="password" id="senha" placeholder="Digite sua senha">
</div>
</div>

</div>



<button type="submit" class="btn-cadastrar">
Cadastrar
</button>

</form>

<a href="login.html" class="login-link">
Já possui conta? Entrar
</a>



<script src="../js/javaCadastro.js"></script>

</body>
</html>
